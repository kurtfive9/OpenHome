<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Five9 Callback Sync - New Field</title>
  <style>
    :root { --bg:#f8fafc; --card:#ffffff; --fg:#0f172a; --muted:#64748b; --accent:#2563eb; --border:#e2e8f0; --radius:12px; }
    * { box-sizing:border-box; }
    body { margin:0; padding:40px 20px; background:var(--bg); color:var(--fg); font-family: 'Inter', system-ui, sans-serif; }
    .wrap { max-width:550px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:30px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    h2 { margin:0 0 20px; font-size:1.5rem; text-align:center; color:#1e293b; }
    
    label { display:block; font-size:.875rem; font-weight:600; color:#475569; margin-bottom:6px; }
    input, select { width:100%; padding:12px; border:1px solid var(--border); border-radius:8px; font-size:1rem; margin-bottom:15px; color:#000; }
    
    .time-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .row { display:grid; gap:15px; grid-template-columns: 1fr 1fr; }
    button { width:100%; background:var(--accent); color:#fff; padding:14px; border:none; border-radius:8px; cursor:pointer; font-weight:700; transition: background 0.2s; }
    button:hover { background:#1d4ed8; }
    button:disabled { background:var(--muted); cursor: not-allowed; }

    .status { margin-top:20px; padding:12px; border-radius:8px; font-size:0.9rem; text-align:center; display:none; border:1px solid transparent; font-weight:600; }
    .status.visible { display:block; }
    .ok { background:#ecfdf5; color:#10b981; border-color:#d1fae5; }
    .err { background:#fef2f2; color:#ef4444; border-color:#fee2e2; }

    .calendar { position:absolute; z-index:100; background:#fff; border:1px solid var(--border); border-radius:8px; width:280px; padding:10px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); display:none; }
    .calendar.visible { display:block; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
    .cal-day { padding:8px; border:none; background:none; cursor:pointer; font-size:0.9rem; border-radius:4px; color: #000000 !important; font-weight: 700; }
    .cal-day:hover { background:var(--accent); color:#fff !important; }
    .cal-label { font-weight:bold; color:#000; margin-bottom:8px; text-align:center; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <!-- Header Updated -->
    <h2>Schedule a Callback</h2>
    <form id="callbackForm">
      <div class="row">
        <div>
          <label>First Name (Optional)</label>
          <!-- Removed 'required' -->
          <input id="firstName" type="text" placeholder="John" />
        </div>
        <div>
          <label>Last Name (Optional)</label>
          <!-- Removed 'required' -->
          <input id="lastName" type="text" placeholder="Doe" />
        </div>
      </div>

      <label>Phone Number</label>
      <input id="phone" type="tel" placeholder="9255550000" required />

      <div style="position:relative;">
        <label>Callback Date</label>
        <input id="dateText" type="text" readonly required style="cursor:pointer; background:#fff;" />
        <input id="dateHidden" type="hidden" />
        <div id="calendar" class="calendar">
          <div id="calLabel" class="cal-label"></div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>

      <label>Callback Time (Minute Precision)</label>
      <div class="time-row">
        <select id="hourPart"></select>
        <select id="minPart"></select>
        <select id="ampmPart">
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>

      <label>Timezone</label>
      <select id="timezone"></select>

      <button type="submit" id="submitBtn">Save Callback</button>
      <div id="status" class="status"></div>
    </form>
  </div>
</div>

<script>
  const F9_DOMAIN = 'OpenHome LLC';
  const F9_LIST = 'Scheduled Callbacks';
  const F9_API_URL = 'https://api.five9.com/web2campaign/AddToList';

  const $ = (id) => document.getElementById(id);
  const pad = (n) => String(n).padStart(2, '0');

  function init() {
    const tz = $('timezone');
    const zones = ["America/New_York", "America/Chicago", "America/Denver", "America/Phoenix", "America/Los_Angeles", "America/Anchorage", "Pacific/Honolulu"];
    zones.forEach(z => tz.add(new Option(z, z)));
    tz.value = Intl.DateTimeFormat().resolvedOptions().timeZone;

    const hh = $('hourPart');
    for(let i=1; i<=12; i++) hh.add(new Option(pad(i), pad(i)));
    
    const mm = $('minPart');
    for(let i=0; i<60; i++) mm.add(new Option(pad(i), pad(i)));

    const now = new Date();
    $('dateHidden').value = now.toISOString().split('T')[0];
    $('dateText').value = now.toISOString().split('T')[0];
    initCalendar();
  }

  function initCalendar() {
    const cal = $('calendar');
    $('dateText').onclick = (e) => { e.stopPropagation(); cal.classList.toggle('visible'); };
    const grid = $('calGrid');
    const now = new Date();
    $('calLabel').textContent = now.toLocaleString('default', { month: 'long', year: 'numeric' });
    
    for (let d = 1; d <= 31; d++) {
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'cal-day'; btn.textContent = d;
      btn.onclick = (e) => {
        e.stopPropagation();
        const val = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(d)}`;
        $('dateHidden').value = val;
        $('dateText').value = val;
        cal.classList.remove('visible');
      };
      grid.appendChild(btn);
      if (d >= new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate()) break;
    }
    document.addEventListener('click', () => cal.classList.remove('visible'));
  }

  async function fireApi(params, label) {
    return new Promise(resolve => {
      const ifr = document.createElement('iframe');
      ifr.style.display = 'none';
      ifr.src = `${F9_API_URL}?${params.toString()}&_cb=${Date.now()}`;
      document.body.appendChild(ifr);
      console.log(`Executing ${label}...`);
      setTimeout(() => {
        document.body.removeChild(ifr);
        resolve();
      }, 1000); 
    });
  }

  $('callbackForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = $('submitBtn');
    const status = $('status');
    btn.disabled = true;
    status.textContent = "Syncing with Five9...";
    status.className = "status visible ok";

    const phone = $('phone').value.replace(/\D/g, '').slice(-10);
    const dateStr = $('dateHidden').value;
    const hour = $('hourPart').value;
    const min = $('minPart').value;
    const ampm = $('ampmPart').value;
    const tzIana = $('timezone').value;

    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m-1, d, 12, 0); 
    const tzShort = new Intl.DateTimeFormat('en-US', { timeZone: tzIana, timeZoneName: 'short' })
                         .formatToParts(dt).find(p => p.type === 'timeZoneName').value;

    const fullTimeStr = `${pad(m)} ${pad(d)}, ${y} ${hour}:${min} ${ampm} ${tzShort}`;

    const params1 = new URLSearchParams({
      F9domain: F9_DOMAIN,
      F9list: F9_LIST,
      number1: phone,
      F9TimeFormat: 'MM dd, yyyy hh:mm a z',
      F9TimeToCall: fullTimeStr,
      F9retResults: 'false'
    });

    const params2 = new URLSearchParams({
      F9domain: F9_DOMAIN,
      F9list: F9_LIST,
      number1: phone,
      first_name: $('firstName').value,
      last_name: $('lastName').value,
      'Scheduled Callback': fullTimeStr,
      F9retResults: 'false'
    });

    try {
      await fireApi(params1, "System Sync");
      await fireApi(params2, "Custom Field Sync");
      
      status.textContent = "Callback successfully updated!";
      status.className = "status visible ok";
    } catch (err) {
      status.textContent = "Update failed. Please check connection.";
      status.className = "status visible err";
    } finally {
      btn.disabled = false;
    }
  };

  init();
</script>

</body>
</html>
